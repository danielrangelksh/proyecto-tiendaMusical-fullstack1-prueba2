server:
  port: 8081

spring:
  application:
    name: Clientes

  datasource:
    url: jdbc:mysql://localhost:3306/db_tiendamusical
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history_cliente
    baseline-version: "0"


  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: laClaveDeLaTiendaDeMusicaEstanLargaLoSuficiente